<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Muhadara RAG — search Arabic/English code-switched lectures by meaning.">
  <meta name="color-scheme" content="dark">
  <title>Muhadara RAG</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Cairo:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans:   ['Inter', 'Cairo', 'system-ui', 'sans-serif'],
            arabic: ['Cairo', 'Inter', 'sans-serif'],
            mono:   ['JetBrains Mono', 'monospace'],
          },
          maxWidth: { 'chat': '768px' },
        },
      },
    };
  </script>
  <script defer src="https://unpkg.com/alpinejs@3.13.5/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="/static/styles.css?v=3">
</head>

<body class="bg-zinc-950 text-zinc-100 antialiased min-h-screen font-sans">

  <!-- Decorative background -->
  <div class="fixed inset-0 -z-10 pointer-events-none">
    <div class="absolute inset-x-0 top-0 h-[60vh] bg-gradient-to-b from-emerald-600/10 via-emerald-600/[0.03] to-transparent"></div>
    <div class="absolute top-[-200px] start-1/2 -translate-x-1/2 size-[600px] rounded-full blur-[160px] opacity-25 bg-emerald-500"></div>
  </div>

  <div x-data="muhadaraApp()" class="flex flex-col min-h-screen">

    <!-- ── Top bar ───────────────────────────────────────── -->
    <header class="sticky top-0 z-20 border-b border-zinc-900/80 bg-zinc-950/80 backdrop-blur-md">
      <div class="max-w-5xl mx-auto px-4 sm:px-6 h-14 flex items-center justify-between gap-3">
        <button @click="resetConversation()" class="flex items-center gap-2 group">
          <span class="size-7 rounded-md bg-gradient-to-br from-emerald-400 to-sky-500 grid place-items-center text-sm shadow shadow-emerald-500/30">🎙️</span>
          <span class="font-semibold text-sm tracking-tight group-hover:text-emerald-400 transition-colors">
            Muhadara <span class="text-zinc-500 font-normal">/</span> <span class="text-emerald-400">RAG</span>
          </span>
        </button>

        <!-- Source pill: shows what we're currently chatting with -->
        <div class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-zinc-900 border border-zinc-800 text-xs">
          <span class="size-1.5 rounded-full bg-emerald-400 animate-pulse"></span>
          <span class="text-zinc-400">Source:</span>
          <span class="font-medium text-zinc-200 truncate max-w-[180px] sm:max-w-xs" x-text="currentSource.name" dir="auto"></span>
          <button x-show="currentSource.type === 'upload'" @click="resetToDemo()"
                  class="ms-1 text-zinc-500 hover:text-zinc-100 transition-colors" title="Back to demo lecture">✕</button>
        </div>

        <a href="https://github.com/Seif-Eldeen-Sameh/muhadara-rag"
           class="hidden sm:flex items-center gap-1.5 text-xs text-zinc-400 hover:text-zinc-100 transition-colors">
          <svg class="size-4" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5C5.65.5.5 5.65.5 12c0 5.09 3.29 9.41 7.86 10.94.58.11.79-.25.79-.56v-2.11c-3.2.7-3.87-1.36-3.87-1.36-.52-1.32-1.27-1.67-1.27-1.67-1.04-.71.08-.7.08-.7 1.15.08 1.76 1.18 1.76 1.18 1.02 1.76 2.69 1.25 3.35.96.1-.74.4-1.25.72-1.54-2.55-.29-5.24-1.27-5.24-5.66 0-1.25.45-2.27 1.18-3.08-.12-.29-.51-1.46.11-3.04 0 0 .96-.31 3.15 1.18a10.97 10.97 0 0 1 5.74 0c2.19-1.49 3.15-1.18 3.15-1.18.62 1.58.23 2.75.11 3.04.73.81 1.18 1.83 1.18 3.08 0 4.4-2.69 5.36-5.25 5.65.41.35.77 1.05.77 2.12v3.14c0 .31.2.67.8.56C20.21 21.4 23.5 17.08 23.5 12 23.5 5.65 18.35.5 12 .5z"/></svg>
          <span>GitHub</span>
        </a>
      </div>
    </header>

    <!-- ── Main ──────────────────────────────────────────── -->
    <main class="flex-1 flex flex-col">

      <!-- Empty state: welcome -->
      <div x-show="messages.length === 0 && !chatStarted" x-transition.opacity
           class="flex-1 flex flex-col items-center justify-center px-4 py-10">
        <div class="w-full max-w-chat space-y-8 text-center">
          <div>
            <h1 class="text-4xl sm:text-5xl font-extrabold tracking-tight">
              <span class="bg-gradient-to-br from-zinc-50 to-zinc-400 bg-clip-text text-transparent">
                Search lectures by
              </span>
              <span class="bg-gradient-to-br from-emerald-300 to-sky-400 bg-clip-text text-transparent">
                meaning
              </span>
            </h1>
            <p class="mt-4 text-zinc-400 text-base sm:text-lg leading-relaxed max-w-xl mx-auto" dir="auto">
              Ask anything about a code-switched Arabic / English lecture.<br class="hidden sm:block">
              Answers cite timestamps that link back to the audio.
            </p>
          </div>

          <!-- Composer (centered, big) -->
          <div class="w-full">
            <div @click="$refs.composer.focus()"
                 class="relative rounded-2xl bg-zinc-900 border border-zinc-800 hover:border-zinc-700 focus-within:border-emerald-500/60 focus-within:ring-2 focus-within:ring-emerald-500/20 transition-colors shadow-2xl shadow-black/40">
              <textarea x-ref="composer" x-model="input" rows="1" dir="auto"
                        @keydown.enter.prevent="if (!$event.shiftKey) send(); else input += '\n'"
                        @input="autoGrow($refs.composer)"
                        placeholder="اسأل بالعربية أو الإنجليزية…  /  Ask anything…"
                        class="block w-full resize-none bg-transparent px-5 pt-4 pb-14 max-h-48 text-[15px] leading-relaxed text-zinc-100 placeholder:text-zinc-600 outline-none"></textarea>

              <div class="absolute bottom-0 inset-x-0 px-3 py-2 flex items-center justify-between">
                <button @click="$refs.fileInput.click()" :disabled="uploading"
                        class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-zinc-400 hover:text-emerald-300 hover:bg-zinc-800/70 transition-colors text-xs disabled:opacity-40 disabled:cursor-not-allowed"
                        title="Upload your own recording">
                  <svg class="size-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                  <span x-show="!uploading">Upload audio</span>
                  <span x-show="uploading" class="dot-pulse"></span>
                </button>
                <input x-ref="fileInput" type="file" accept="audio/*" @change="handleFile($event)" class="hidden">

                <button @click="send()" :disabled="loading || !input.trim()"
                        class="size-9 rounded-lg bg-emerald-500 hover:bg-emerald-400 text-white grid place-items-center disabled:bg-zinc-800 disabled:text-zinc-600 disabled:cursor-not-allowed transition-colors shadow-lg shadow-emerald-500/30 disabled:shadow-none">
                  <svg class="size-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 12h14M13 5l7 7-7 7" class="rtl:hidden"/>
                    <path d="M19 12H5M11 5l-7 7 7 7" class="hidden rtl:block"/>
                  </svg>
                </button>
              </div>
            </div>

            <p x-show="uploadStatus" :class="uploadError ? 'text-rose-400' : 'text-emerald-400'"
               class="mt-3 text-xs font-medium" x-text="uploadStatus"></p>
          </div>

          <!-- Suggested prompts -->
          <div>
            <div class="flex flex-wrap justify-center gap-2">
              <template x-for="p in examples" :key="p">
                <button @click="input = p; send()" dir="auto"
                        class="text-xs sm:text-sm px-3.5 py-2 bg-zinc-900/60 border border-zinc-800 rounded-full hover:border-emerald-500/40 hover:bg-emerald-500/10 hover:text-emerald-300 text-zinc-300 transition-colors">
                  <span x-text="p"></span>
                </button>
              </template>
            </div>
          </div>

          <!-- Audio playback (subtle, collapsible) -->
          <div class="mt-2">
            <details class="group rounded-xl border border-zinc-900 bg-zinc-900/40 backdrop-blur overflow-hidden">
              <summary class="flex items-center justify-between gap-3 px-4 py-3 cursor-pointer hover:bg-zinc-900/70 transition-colors list-none">
                <span class="flex items-center gap-2 text-sm text-zinc-300">
                  <svg class="size-4 text-zinc-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
                  <span>Play the lecture audio</span>
                </span>
                <svg class="size-4 text-zinc-500 transition-transform group-open:rotate-180" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
              </summary>
              <div class="border-t border-zinc-900 p-4">
                <audio controls preload="metadata" :src="currentSource.audioUrl" x-ref="audio" class="w-full"></audio>
              </div>
            </details>
          </div>
        </div>
      </div>

      <!-- Conversation -->
      <div x-show="chatStarted" x-transition.opacity class="flex-1 flex flex-col">

        <!-- Inline audio strip (sticky under topbar) -->
        <div class="sticky top-14 z-10 border-b border-zinc-900/80 bg-zinc-950/85 backdrop-blur">
          <div class="max-w-chat mx-auto px-4 sm:px-6 py-2.5 flex items-center gap-3">
            <button @click="toggleAudio()" :class="audioPlaying ? 'bg-emerald-500/20 text-emerald-300' : 'bg-zinc-800 text-zinc-300 hover:bg-zinc-700'"
                    class="size-8 rounded-full grid place-items-center transition-colors shrink-0">
              <svg x-show="!audioPlaying" class="size-3.5" fill="currentColor" viewBox="0 0 16 16"><path d="M5.5 3.5a.5.5 0 0 1 .77-.42l6 4a.5.5 0 0 1 0 .84l-6 4A.5.5 0 0 1 5.5 11.5v-8z"/></svg>
              <svg x-show="audioPlaying" class="size-3.5" fill="currentColor" viewBox="0 0 16 16"><path d="M5 3h2v10H5zM9 3h2v10H9z"/></svg>
            </button>
            <div class="flex-1 min-w-0">
              <p class="text-xs text-zinc-500 truncate" x-text="currentSource.name" dir="auto"></p>
            </div>
            <audio x-ref="audio" :src="currentSource.audioUrl"
                   @play="audioPlaying = true" @pause="audioPlaying = false" @ended="audioPlaying = false"
                   class="hidden"></audio>
          </div>
        </div>

        <!-- Messages -->
        <div class="flex-1 overflow-y-auto" x-ref="scroll">
          <div class="max-w-chat mx-auto px-4 sm:px-6 py-6 space-y-5">
            <template x-for="(msg, i) in messages" :key="i">
              <div class="flex gap-3" :class="msg.role === 'user' ? 'justify-end' : ''">
                <!-- Assistant avatar -->
                <div x-show="msg.role === 'assistant'" class="shrink-0 size-8 rounded-full bg-gradient-to-br from-emerald-400 to-sky-500 grid place-items-center text-xs shadow shadow-emerald-500/30">🎙️</div>

                <div class="max-w-[85%] space-y-2 min-w-0">
                  <div :class="msg.role === 'user'
                        ? 'bg-emerald-500/15 text-emerald-50 ring-1 ring-emerald-500/20'
                        : 'bg-zinc-900 text-zinc-100 ring-1 ring-zinc-800'"
                       class="rounded-2xl px-4 py-3 text-[15px] leading-relaxed whitespace-pre-wrap"
                       dir="auto">
                    <span x-html="msg.html || msg.content"></span>
                  </div>

                  <!-- Sources accordion (assistant messages only) -->
                  <details x-show="msg.sources && msg.sources.length > 0" class="group">
                    <summary class="cursor-pointer text-xs text-zinc-500 hover:text-zinc-300 transition-colors inline-flex items-center gap-1.5 select-none list-none">
                      <svg class="size-3 transition-transform group-open:rotate-90" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
                      <span x-text="`${msg.sources?.length} sources`"></span>
                    </summary>
                    <div class="mt-2 space-y-2">
                      <template x-for="(s, j) in msg.sources" :key="j">
                        <div class="rounded-lg bg-zinc-900/60 ring-1 ring-zinc-800 p-3">
                          <div class="flex items-center justify-between gap-2 mb-1.5">
                            <button @click="seekTo(s.abs_start)"
                                    class="font-mono text-[11px] px-1.5 py-0.5 bg-emerald-500/15 text-emerald-300 hover:bg-emerald-500/25 rounded ring-1 ring-emerald-500/20 transition-colors inline-flex items-center gap-1">
                              <svg class="size-3" fill="currentColor" viewBox="0 0 16 16"><path d="M5.5 3.5a.5.5 0 0 1 .77-.42l6 4a.5.5 0 0 1 0 .84l-6 4A.5.5 0 0 1 5.5 11.5v-8z"/></svg>
                              <span x-text="s.timestamp"></span>
                            </button>
                            <span class="text-[10px] font-mono text-zinc-500" x-text="s.score.toFixed(3)"></span>
                          </div>
                          <p class="text-xs text-zinc-300 leading-relaxed" dir="auto"
                             x-text="s.text.slice(0, 200) + (s.text.length > 200 ? '…' : '')"></p>
                        </div>
                      </template>
                    </div>
                  </details>
                </div>
              </div>
            </template>

            <!-- Thinking indicator -->
            <template x-if="loading">
              <div class="flex gap-3">
                <div class="shrink-0 size-8 rounded-full bg-gradient-to-br from-emerald-400 to-sky-500 grid place-items-center text-xs shadow shadow-emerald-500/30">🎙️</div>
                <div class="bg-zinc-900 ring-1 ring-zinc-800 rounded-2xl px-4 py-3 text-zinc-400 inline-flex items-center gap-1">
                  <span class="dot-pulse"></span><span class="dot-pulse" style="animation-delay:.15s"></span><span class="dot-pulse" style="animation-delay:.3s"></span>
                </div>
              </div>
            </template>
          </div>
        </div>

        <!-- Composer pinned -->
        <div class="border-t border-zinc-900/80 bg-zinc-950/85 backdrop-blur sticky bottom-0">
          <div class="max-w-chat mx-auto px-4 sm:px-6 py-4">
            <div @click="$refs.composer2.focus()"
                 class="relative rounded-2xl bg-zinc-900 border border-zinc-800 hover:border-zinc-700 focus-within:border-emerald-500/60 focus-within:ring-2 focus-within:ring-emerald-500/20 transition-colors">
              <textarea x-ref="composer2" x-model="input" rows="1" dir="auto"
                        @keydown.enter.prevent="if (!$event.shiftKey) send(); else input += '\n'"
                        @input="autoGrow($refs.composer2)"
                        placeholder="Ask a follow-up…"
                        class="block w-full resize-none bg-transparent px-4 pt-3 pb-12 max-h-40 text-[15px] leading-relaxed text-zinc-100 placeholder:text-zinc-600 outline-none"></textarea>
              <div class="absolute bottom-0 inset-x-0 px-3 py-2 flex items-center justify-between">
                <button @click="$refs.fileInput.click()" :disabled="uploading"
                        class="inline-flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg text-zinc-400 hover:text-emerald-300 hover:bg-zinc-800/70 transition-colors text-xs disabled:opacity-40 disabled:cursor-not-allowed">
                  <svg class="size-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                  <span x-show="!uploading" class="hidden sm:inline">Upload</span>
                  <span x-show="uploading" class="dot-pulse"></span>
                </button>
                <button @click="send()" :disabled="loading || !input.trim()"
                        class="size-9 rounded-lg bg-emerald-500 hover:bg-emerald-400 text-white grid place-items-center disabled:bg-zinc-800 disabled:text-zinc-600 disabled:cursor-not-allowed transition-colors shadow-lg shadow-emerald-500/30 disabled:shadow-none">
                  <svg class="size-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 12H5M11 5l-7 7 7 7"/>
                  </svg>
                </button>
              </div>
            </div>
            <p x-show="uploadStatus" :class="uploadError ? 'text-rose-400' : 'text-emerald-400'"
               class="mt-2 text-xs font-medium" x-text="uploadStatus"></p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/static/app.js?v=3"></script>
</body>
</html>
